name: Build GuardSwitch

on:
  # Manuell: leer lassen = nur Build-Test (Artifacts, kein Release).
  # Version eintragen (z.B. 1.0.0) = Tag erstellen, bauen, Release veröffentlichen.
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release-Version (X.Y.Z, leer lassen = nur Build-Check ohne Release)'
        required: false
        type: string
  # Falls jemand lokal einen v*-Tag pusht, bauen wir auch.
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Version einmal zentral bestimmen & validieren. Beide Build-Jobs und der
  # Release-Job hängen davon ab, damit Windows- und Linux-Build dieselbe
  # Versionsnummer verwenden und der Tag nur einmal erzeugt wird.
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      release: ${{ steps.version.outputs.release }}
      create_tag: ${{ steps.version.outputs.create_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Tags brauchen wir für die Existenz-Prüfung
          fetch-depth: 0

      - name: Determine version & validate
        id: version
        shell: bash
        run: |
          set -e
          if [[ -n "${{ inputs.release_version }}" ]]; then
            v="${{ inputs.release_version }}"
            if [[ ! "$v" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::Version muss X.Y.Z sein (z.B. 1.0.0), war: $v"
              exit 1
            fi
            if git rev-parse "v$v" >/dev/null 2>&1; then
              echo "::error::Tag v$v existiert bereits - höhere Version wählen"
              exit 1
            fi
            echo "version=$v"          >> "$GITHUB_OUTPUT"
            echo "release=true"        >> "$GITHUB_OUTPUT"
            echo "create_tag=true"     >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
            echo "release=true"        >> "$GITHUB_OUTPUT"
            echo "create_tag=false"    >> "$GITHUB_OUTPUT"
          else
            # workflow_dispatch ohne Versionseingabe → reiner Test-Build
            echo "version=0.0.0"       >> "$GITHUB_OUTPUT"
            echo "release=false"       >> "$GITHUB_OUTPUT"
            echo "create_tag=false"    >> "$GITHUB_OUTPUT"
          fi

  build-windows:
    needs: version
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Publish Service (self-contained, single-file)
        run: >
          dotnet publish src\WgAutoswitch.Service\WgAutoswitch.Service.csproj
          -c Release
          -r win-x64
          --self-contained
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true

      - name: Publish Tray (self-contained, single-file)
        run: >
          dotnet publish src\WgAutoswitch.Tray\WgAutoswitch.Tray.csproj
          -c Release
          -r win-x64
          --self-contained
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true

      - name: Build Installer (Inno Setup)
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            /DMyAppVersion=${{ needs.version.outputs.version }} `
            installer\guardswitch.iss

      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: guardswitch-installer-${{ needs.version.outputs.version }}
          path: installer\output\*.exe
          if-no-files-found: error

  build-linux:
    needs: version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish Service
        run: >
          dotnet publish src/WgAutoswitch.Service/WgAutoswitch.Service.csproj
          -c Release
          -r linux-x64
          --self-contained
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true

      - name: Publish Linux Tray
        run: >
          dotnet publish src/WgAutoswitch.LinuxTray/WgAutoswitch.LinuxTray.csproj
          -c Release
          -r linux-x64
          --self-contained
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true

      - name: Package Linux tarball
        run: |
          mkdir -p dist/guardswitch-linux-x64/packaging/linux
          cp src/WgAutoswitch.Service/bin/Release/net8.0/linux-x64/publish/WgAutoswitch.Service dist/guardswitch-linux-x64/
          cp src/WgAutoswitch.LinuxTray/bin/Release/net8.0/linux-x64/publish/WgAutoswitch.LinuxTray dist/guardswitch-linux-x64/
          cp packaging/linux/guardswitch.service dist/guardswitch-linux-x64/packaging/linux/
          cp packaging/linux/guardswitch-tray.desktop dist/guardswitch-linux-x64/packaging/linux/
          cp LINUX.md README.md LICENSE dist/guardswitch-linux-x64/
          tar -C dist -czf guardswitch-linux-x64.tar.gz guardswitch-linux-x64

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: guardswitch-linux-x64
          path: guardswitch-linux-x64.tar.gz
          if-no-files-found: error

  # Ein Release pro Version mit BEIDEN Plattformen dran. Läuft erst, wenn
  # Windows- und Linux-Build erfolgreich sind, sammelt beide Artifacts ein und
  # erstellt (bei manueller Version) zuerst den Tag.
  release:
    needs: [version, build-windows, build-linux]
    if: needs.version.outputs.release == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # Tag erst NACH erfolgreichen Builds erstellen, damit kein "leerer" Tag
      # entsteht, falls ein Build vorher schon scheitert.
      - name: Create and push release tag
        if: needs.version.outputs.create_tag == 'true'
        shell: bash
        run: |
          tag="v${{ needs.version.outputs.version }}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "Release $tag"
          git push origin "$tag"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: GuardSwitch ${{ needs.version.outputs.version }}
          files: |
            artifacts/**/*.exe
            artifacts/**/*.tar.gz
          generate_release_notes: true
          body: |
            **Windows:** `guardswitch-setup-${{ needs.version.outputs.version }}.exe`
            **Linux (x64):** `guardswitch-linux-x64.tar.gz`

            **Windows-Voraussetzung:** [WireGuard für Windows](https://www.wireguard.com/install/)
            mit mindestens einem eingerichteten Tunnel. Beim ersten Start zeigt
            Windows eine SmartScreen-Warnung ("Unbekannter Herausgeber") – der
            Installer ist nicht code-signed. "Weitere Infos" → "Trotzdem ausführen".

            **Linux-Voraussetzung:** NetworkManager mit importiertem WireGuard-Profil.
            Installation siehe `LINUX.md` im Tarball.
